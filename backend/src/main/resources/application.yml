spring:
  application:
    name: hack-html-backend
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb://root:changeme@localhost:27017/hackhtml?authSource=admin}
      auto-index-creation: true

server:
  port: 8080

# Custom application settings
app:
  jwt:
    secret: ${JWT_SECRET:change-this-to-a-long-random-secret-at-least-32-bytes-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:minioadmin}
    secret-key: ${MINIO_SECRET_KEY:minioadmin}
    bucket: ${MINIO_BUCKET:documents}
  pdf:
    enabled: ${PDF_ENABLED:true}
    pool-size: ${PDF_POOL_SIZE:2}
    max-html-bytes: ${PDF_MAX_HTML_BYTES:5242880}
    timeout-ms: ${PDF_TIMEOUT_MS:15000}
  oauth2:
    google:
      client-id: ${GOOGLE_CLIENT_ID:}
      client-secret: ${GOOGLE_CLIENT_SECRET:}
    github:
      client-id: ${GITHUB_CLIENT_ID:}
      client-secret: ${GITHUB_CLIENT_SECRET:}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    com.hackhtml: INFO
